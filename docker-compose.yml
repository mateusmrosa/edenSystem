services:
  mysql:
    image: mysql:8.0
    container_name: eden-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eden}
      MYSQL_USER: ${MYSQL_USER:-eden}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eden}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: eden-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-local.ini:ro
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-eden}
      DB_USERNAME: ${MYSQL_USER:-eden}
      DB_PASSWORD: ${MYSQL_PASSWORD:-eden}
      # Evita gravar laravel.log / cache em disco no bind mount (erro de permissão 1000 vs www-data)
      LOG_CHANNEL: stderr
      CACHE_STORE: array
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: eden-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  node:
    image: node:22-alpine
    container_name: eden-node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - frontend_node_modules:/var/www/html/node_modules
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_API: http://nginx:80
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - nginx
    profiles:
      - dev

  composer:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/tmp/composer
    environment:
      COMPOSER_HOME: /tmp/composer
    entrypoint: ["composer"]
    profiles:
      - tools

  npm:
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - frontend_node_modules:/var/www/html/node_modules
    entrypoint: ["npm"]
    profiles:
      - tools

volumes:
  mysql_data:
  frontend_node_modules:
  composer_cache:
